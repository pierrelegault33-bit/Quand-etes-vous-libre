<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quand êtes-vous libres?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #EEF3EF;
    --paper: #FFFFFF;
    --ink: #1B2A2E;
    --ink-soft: #5B6B68;
    --line: #DCE4DE;
    --coral: #FF6B4A;
    --coral-dark: #B8431F;
    --coral-soft: #FFD9CC;
    --coral-mid: #FF9D7F;
    --gold: #F4B942;
    --gold-dark: #8A6308;
    --dusk: #5B7FA6;
    --dusk-dark: #2E4A66;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  button, .icon-btn, .cal-cell, .hswitch, .swatch, .segmented button, .member-chip, .hour-row{
    -webkit-user-select: none; user-select: none;
  }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  #app{ max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 0 0 48px; position: relative; }

  h1, h2, h3{ font-family: 'Fraunces', serif; font-weight: 600; margin: 0; color: var(--ink); }

  .screen{ padding: 28px 20px 0; animation: fade .35s ease both; }
  @keyframes fade{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }

  /* ---------- JOIN SCREEN ---------- */
  .brand-mark{ width:56px; height:56px; border-radius:16px; background: var(--coral); display:flex; align-items:center; justify-content:center; margin-bottom:18px; transform: rotate(-4deg); }
  .brand-mark svg{ width:28px; height:28px; }
  .lead{ font-size:30px; line-height:1.15; margin-bottom:6px; }
  .sub{ color: var(--ink-soft); font-size:15px; line-height:1.5; margin-bottom:28px; max-width:320px; }
  label.field-label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:18px 0 6px; font-weight:600; }
  input.field{ width:100%; padding:13px 14px; font-size:16px; font-family:'Manrope',sans-serif; border:1.5px solid var(--line); border-radius:12px; background:var(--paper); color:var(--ink); outline:none; }
  input.field:focus{ border-color: var(--coral); }
  .btn{ display:flex; align-items:center; justify-content:center; gap:8px; border:none; cursor:pointer; font-family:'Manrope',sans-serif; font-weight:700; font-size:16px; border-radius:12px; padding:14px 20px; transition: transform .12s ease; touch-action: manipulation; }
  .btn:active{ transform: scale(.97); }
  .btn-primary{ background: var(--coral); color:#fff; width:100%; margin-top:26px; }
  .btn-ghost{ background: transparent; color: var(--ink-soft); border:1.5px solid var(--line); }
  .btn-small{ font-size:13px; padding:8px 14px; border-radius:9px; }
  .hint-row{ display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px; color: var(--ink-soft); }
  .swatches{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .swatch{ width:30px; height:30px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
  .swatch.active{ border-color: var(--ink); }

  /* ---------- PLANNER SCREEN ---------- */
  .topbar{ display:flex; align-items:flex-start; justify-content:space-between; padding:22px 20px 14px; }
  .topbar .room-name{ font-size:22px; }
  .topbar .room-code{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--ink-soft); margin-top:2px; }
  .icon-btn{ width:36px; height:36px; border-radius:10px; border:1.5px solid var(--line); background: var(--paper); display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; touch-action: manipulation; }
  .icon-btn:active{ transform: scale(.93); }

  .members-row{ display:flex; gap:8px; padding:0 20px 16px; overflow-x:auto; }
  .member-chip{ flex:0 0 auto; display:flex; align-items:center; gap:6px; background: var(--paper); border:1px solid var(--line); border-radius:999px; padding:5px 12px 5px 5px; font-size:13px; font-weight:600; }
  .member-dot{ width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; font-weight:700; flex:0 0 auto; }

  .segmented{ margin:0 20px 18px; display:flex; background: var(--paper); border:1.5px solid var(--line); border-radius:12px; padding:4px; }
  .segmented button{ flex:1; border:none; background:transparent; padding:9px 0; font-family:'Manrope',sans-serif; font-weight:700; font-size:13.5px; color: var(--ink-soft); border-radius:9px; cursor:pointer; }
  .segmented button.active{ background: var(--ink); color:#fff; }

  /* month nav */
  .month-nav{ display:flex; align-items:center; justify-content:space-between; padding: 0 20px 14px; }
  .month-label{ font-size:18px; text-transform:capitalize; }
  .month-nav-controls{ display:flex; gap:8px; align-items:center; }

  .legend{ display:flex; align-items:center; gap:14px; padding:0 20px 12px; font-size:12px; color: var(--ink-soft); flex-wrap:wrap; }
  .legend-item{ display:flex; align-items:center; gap:5px; }
  .legend-swatch{ width:12px; height:12px; border-radius:4px; }

  /* calendar grid */
  .cal-wrap{ padding: 0 20px; }
  .cal-weekdays{ display:grid; grid-template-columns: repeat(7,1fr); margin-bottom:6px; }
  .cal-weekdays div{ text-align:center; font-size:11px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; }
  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:5px; }
  .cal-cell{
    position:relative; aspect-ratio: 1; border-radius:10px; background: var(--paper);
    border:1px solid var(--line); cursor:pointer; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3px; overflow:hidden; touch-action: manipulation;
  }
  .cal-cell.other-month{ opacity:.32; }
  .cal-cell.is-today{ border-color: var(--ink); border-width:1.5px; }
  .cal-cell.full-overlap-day{ box-shadow: 0 0 0 2px var(--gold) inset; }
  .cal-daynum{ font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:500; }
  .cal-dots{ display:flex; gap:2px; flex-wrap:wrap; justify-content:center; max-width:34px; }
  .cal-dot{ width:5px; height:5px; border-radius:50%; }
  .cal-bar{ position:absolute; bottom:0; left:0; right:0; height:5px; border-radius:0 0 9px 9px; }

  .empty-state{ padding:30px 20px; text-align:center; color: var(--ink-soft); font-size:14px; }
  .bottom-actions{ display:flex; gap:10px; padding:22px 20px 0; }

  /* sheets / overlay */
  .overlay{ position:fixed; inset:0; background: rgba(27,42,46,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .sheet{ background: var(--paper); width:100%; max-width:480px; max-height: 80vh; overflow-y:auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom)); animation: rise .25s ease both; }
  @keyframes rise{ from{ transform: translateY(100%);} to{ transform:none; } }
  .sheet-header{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:2px; }
  .sheet-close-x{ width:32px; height:32px; border-radius:50%; background: var(--bg); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; touch-action: manipulation; -webkit-user-select:none; user-select:none; }
  .sheet h3{ font-size:18px; margin-bottom:2px; text-transform:capitalize; }
  .sheet .sheet-sub{ font-size:13px; color: var(--ink-soft); margin-bottom:14px; }
  .sheet-quick{ display:flex; gap:8px; margin-bottom:14px; }
  .sheet-person{ display:flex; align-items:center; gap:10px; padding:8px 0; font-size:14px; font-weight:600; }

  .hour-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 2px; border-bottom:1px solid var(--line); }
  .hour-row:last-child{ border-bottom:none; }
  .hour-row.row-overlap{ background: linear-gradient(90deg, rgba(244,185,66,.12), transparent); border-radius:6px; }
  .hour-time{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--ink-soft); width:56px; flex:0 0 auto; }
  .hswitch{ width:42px; height:24px; border-radius:999px; background: var(--line); position:relative; cursor:pointer; flex:0 0 auto; transition: background .15s ease; touch-action: manipulation; }
  .hswitch.on{ background: var(--coral); }
  .hswitch .knob{ position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition: transform .15s ease; }
  .hswitch.on .knob{ transform: translateX(18px); }
  .hour-avatars{ display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; flex:1; }

  .toast{ position:fixed; bottom:18px; left:50%; transform: translateX(-50%); background: var(--ink); color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:60; opacity:0; transition: opacity .25s ease; max-width:90%; text-align:center; }
  .toast.show{ opacity:1; }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// Configuration Firebase - Remplacez par votre propre configuration
const firebaseConfig = {
  apiKey: "AIzaSyB2R2WQ3OY8Nk2F0F0J0j1j0J0j1j0J0j0",
  authDomain: "dispo-amis.firebaseapp.com",
  databaseURL: "https://dispo-amis-default-rtdb.firebaseio.com/",
  projectId: "dispo-amis",
  storageBucket: "dispo-amis.appspot.com",
  messagingSenderId: "123456789012",
  appId: "1:123456789012:web:1234567890abcdef123456"
};

// Initialisation Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const PALETTE = [
  {bg:'#FF6B4A', dark:'#B8431F'},
  {bg:'#5B7FA6', dark:'#2E4A66'},
  {bg:'#F4B942', dark:'#8A6308'},
  {bg:'#8C5383', dark:'#5C2F55'},
  {bg:'#2F9C8F', dark:'#1B5E56'},
  {bg:'#E8607A', dark:'#A3324A'},
  {bg:'#6B7280', dark:'#3F434B'},
  {bg:'#8BA94B', dark:'#566B2A'},
];

const HOURS = [];
for(let h=8; h<=23; h++) HOURS.push(h);
const WEEKDAY_LABELS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

const state = {
  screen: 'join',
  room: '',
  name: '',
  colorIdx: 0,
  members: [],
  myAvail: new Set(),
  allAvail: {},
  view: 'mine',
  viewMonth: startOfMonth(new Date()),
  sheetOpenFor: null,
};

function pad(n){ return n<10 ? '0'+n : ''+n; }
function dstr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function fmtSlot(dateStr, hour){ return dateStr+'_'+hour; }
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function colorOf(idx){ return PALETTE[idx % PALETTE.length]; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

// Gestion des données Firebase
async function saveToFirebase(path, data) {
  try {
    await database.ref(path).set(data);
    return true;
  } catch (error) {
    console.error("Erreur lors de l'enregistrement:", error);
    showToast("Erreur de sauvegarde");
    return false;
  }
}

async function loadFromFirebase(path) {
  try {
    const snapshot = await database.ref(path).once('value');
    return snapshot.val();
  } catch (error) {
    console.error("Erreur lors du chargement:", error);
    return null;
  }
}

async function joinRoom(room, name, colorIdx){
  state.room = room.trim().toLowerCase().replace(/\s+/g,'-');
  state.name = name.trim();
  state.colorIdx = colorIdx;

  // Sauvegarder les données locales
  localStorage.setItem('last-session', JSON.stringify({room: state.room, name: state.name, colorIdx}));

  // Charger les membres du groupe
  const membersRaw = await loadFromFirebase(`members/${state.room}`);
  let members = [];
  if(membersRaw){ 
    members = Object.values(membersRaw);
  }
  
  const existing = members.find(m => m.name.toLowerCase() === state.name.toLowerCase());
  if(!existing){
    members.push({name: state.name, colorIdx: state.colorIdx});
    await saveToFirebase(`members/${state.room}`, members.reduce((acc, member, index) => {
      acc[index] = member;
      return acc;
    }, {}));
  } else {
    state.colorIdx = existing.colorIdx;
  }
  state.members = members;

  // Charger les disponibilités personnelles
  const mineRaw = await loadFromFirebase(`avail/${state.room}/${state.name}`);
  state.myAvail = new Set();
  if(mineRaw){ 
    try {
      JSON.parse(mineRaw).forEach(s => state.myAvail.add(s));
    } catch(e) {}
  }
  state.allAvail[state.name] = new Set(state.myAvail);

  state.screen = 'planner';
  render();
  refreshEverything();
  startPolling();
}

async function refreshEverything(){
  // Charger les membres
  const membersRaw = await loadFromFirebase(`members/${state.room}`);
  if(membersRaw){
    state.members = Object.values(membersRaw);
  }
  
  // Charger les disponibilités de tous les membres
  const all = {};
  for(const m of state.members){
    const raw = await loadFromFirebase(`avail/${state.room}/${m.name}`);
    let set = new Set();
    if(raw){ 
      try {
        JSON.parse(raw).forEach(s => set.add(s));
      } catch(e) {}
    }
    all[m.name] = set;
  }
  state.allAvail = all;
  if(state.screen === 'planner') render();
}

let pollHandle = null;
function startPolling(){
  if(pollHandle) clearInterval(pollHandle);
  pollHandle = setInterval(refreshEverything, 5000);
}

async function persistMine(){
  const availData = Array.from(state.myAvail);
  await saveToFirebase(`avail/${state.room}/${state.name}`, JSON.stringify(availData));
  state.allAvail[state.name] = new Set(state.myAvail);
}

function leaveRoom(){
  if(pollHandle) clearInterval(pollHandle);
  state.screen = 'join';
  state.room = ''; state.name = ''; state.sheetOpenFor = null;
  document.body.style.overflow = '';
  render();
}

async function clearMyAvail(){
  state.myAvail = new Set();
  await persistMine();
  render();
  showToast('Tes disponibilités ont été effacées.');
}

/* ---------- JOIN SCREEN ---------- */
function renderJoin(){
  const root = document.getElementById('app');
  root.innerHTML = `
    <div class="screen">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2"></rect>
          <line x1="3" y1="10" x2="21" y2="10"></line>
          <circle cx="8" cy="15" r="1.4" fill="white" stroke="none"></circle>
          <circle cx="13" cy="15" r="1.4" fill="white" stroke="none"></circle>
          <circle cx="8" cy="18" r="1.4" fill="white" stroke="none"></circle>
        </svg>
      </div>
      <h1 class="lead">Quand êtes-vous libres?</h1>
      <p class="sub">Crée un groupe ou rejoins celui de tes amis pour comparer vos disponibilités, sur plusieurs mois si besoin.</p>

      <label class="field-label">Code du groupe</label>
      <input id="in-room" class="field" placeholder="ex. road-trip-ete" autocomplete="off" />

      <label class="field-label">Ton prénom</label>
      <input id="in-name" class="field" placeholder="ex. Sam" autocomplete="off" />

      <label class="field-label">Ta couleur</label>
      <div class="swatches" id="swatches"></div>

      <button class="btn btn-primary" id="btn-join">Rejoindre le groupe</button>
      <div class="hint-row">Pas de mot de passe — quiconque a le code peut voir et modifier ses propres disponibilités.</div>
    </div>
  `;

  const sw = document.getElementById('swatches');
  PALETTE.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'swatch' + (i===state.colorIdx ? ' active' : '');
    el.style.background = c.bg;
    el.onclick = () => { state.colorIdx = i; renderJoin(); };
    sw.appendChild(el);
  });

  const roomInput = document.getElementById('in-room');
  const nameInput = document.getElementById('in-name');
  roomInput.value = state._draftRoom || '';
  nameInput.value = state._draftName || '';
  roomInput.oninput = e => state._draftRoom = e.target.value;
  nameInput.oninput = e => state._draftName = e.target.value;

  document.getElementById('btn-join').onclick = async () => {
    const room = roomInput.value.trim();
    const name = nameInput.value.trim();
    if(!room || !name){ showToast('Ajoute un code de groupe et ton prénom.'); return; }
    document.getElementById('btn-join').textContent = 'Connexion...';
    await joinRoom(room, name, state.colorIdx);
  };

  // Charger la dernière session sauvegardée localement
  const lastSession = localStorage.getItem('last-session');
  if(lastSession){
    try {
      const data = JSON.parse(lastSession);
      if(data && !roomInput.value){
        roomInput.value = data.room || '';
        nameInput.value = data.name || '';
        state.colorIdx = typeof data.colorIdx === 'number' ? data.colorIdx : 0;
        state._draftRoom = roomInput.value;
        state._draftName = nameInput.value;
        renderJoin();
      }
    } catch(e) {}
  }
}

/* ---------- CALENDAR HELPERS ---------- */
function buildMonthGrid(monthDate){
  const year = monthDate.getFullYear(), month = monthDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  let startOffset = firstOfMonth.getDay() - 1;
  if(startOffset < 0) startOffset = 6;
  const gridStart = new Date(year, month, 1 - startOffset);
  const cells = [];
  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate()+i);
    cells.push(d);
  }
  while(cells.length > 35){
    const lastRow = cells.slice(cells.length-7);
    if(lastRow.every(d => d.getMonth() !== month)) cells.splice(cells.length-7, 7);
    else break;
  }
  return cells;
}

function myHourCount(dateStr){
  let c = 0;
  HOURS.forEach(h => { if(state.myAvail.has(fmtSlot(dateStr,h))) c++; });
  return c;
}

function membersAvailableAnytime(dateStr){
  return state.members.filter(m => {
    const set = state.allAvail[m.name];
    if(!set) return false;
    return HOURS.some(h => set.has(fmtSlot(dateStr,h)));
  });
}

function hasFullOverlapHour(dateStr){
  if(state.members.length < 2) return false;
  return HOURS.some(h => {
    const slot = fmtSlot(dateStr,h);
    return state.members.every(m => state.allAvail[m.name] && state.allAvail[m.name].has(slot));
  });
}

/* ---------- PLANNER SCREEN (single render pass, sheet included) ---------- */
function renderPlanner(){
  const root = document.getElementById('app');
  const today = new Date();

  let membersHtml = state.members.map(m => {
    const c = colorOf(m.colorIdx);
    const initial = m.name.charAt(0).toUpperCase();
    return `<div class="member-chip"><div class="member-dot" style="background:${c.bg}">${initial}</div>${escapeHtml(m.name)}</div>`;
  }).join('');

  const monthLabel = state.viewMonth.toLocaleDateString('fr-CA', {month:'long', year:'numeric'});
  const cells = buildMonthGrid(state.viewMonth);
  let weekdaysHtml = WEEKDAY_LABELS.map(w => `<div>${w}</div>`).join('');

  let gridHtml = '';
  cells.forEach(d => {
    const dateStr = dstr(d);
    const otherMonth = d.getMonth() !== state.viewMonth.getMonth();
    const isToday = sameDay(d, today);

    if(state.view === 'mine'){
      const count = otherMonth ? 0 : myHourCount(dateStr);
      let barStyle = '';
      if(count > 0){
        const intensity = count >= 11 ? 1 : count >= 5 ? 0.65 : 0.35;
        barStyle = `style="height:100%; background:${colorOf(state.colorIdx).bg}; opacity:${intensity}; border-radius:9px;"`;
      }
      gridHtml += `<div class="cal-cell ${otherMonth?'other-month':''} ${isToday?'is-today':''}" data-date="${dateStr}">
        ${count>0 ? `<div class="cal-bar" ${barStyle}></div>` : ''}
        <div class="cal-daynum" style="${count>0?'position:relative;z-index:1;color:#fff;':''}">${d.getDate()}</div>
      </div>`;
    } else {
      const peopleHere = otherMonth ? [] : membersAvailableAnytime(dateStr);
      const fullOverlap = !otherMonth && hasFullOverlapHour(dateStr);
      const dotsHtml = peopleHere.slice(0,8).map(m => `<div class="cal-dot" style="background:${colorOf(m.colorIdx).bg}"></div>`).join('');
      gridHtml += `<div class="cal-cell ${otherMonth?'other-month':''} ${isToday?'is-today':''} ${fullOverlap?'full-overlap-day':''}" data-date="${dateStr}">
        <div class="cal-daynum">${d.getDate()}</div>
        <div class="cal-dots">${dotsHtml}</div>
      </div>`;
    }
  });

  root.innerHTML = `
    <div class="topbar">
      <div>
        <div class="room-name">${escapeHtml(state.room)}</div>
        <div class="room-code">${state.members.length} ami${state.members.length>1?'s':''} dans ce groupe</div>
      </div>
      <div style="display:flex; gap:8px;">
        <div class="icon-btn" id="btn-refresh" title="Actualiser">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </div>
        <div class="icon-btn" id="btn-leave" title="Quitter">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </div>
      </div>
    </div>

    <div class="members-row">${membersHtml}</div>

    <div class="segmented">
      <button data-v="mine" class="${state.view==='mine'?'active':''}">Mes dispos</button>
      <button data-v="everyone" class="${state.view==='everyone'?'active':''}">Tout le monde</button>
    </div>

    <div class="month-nav">
      <div class="month-label">${monthLabel}</div>
      <div class="month-nav-controls">
        <div class="icon-btn" id="btn-today" title="Aujourd'hui">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="1.5" fill="#1B2A2E" stroke="none"></circle></svg>
        </div>
        <div class="icon-btn" id="btn-prev-month" title="Mois précédent">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <div class="icon-btn" id="btn-next-month" title="Mois suivant">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </div>

    ${state.view === 'mine' ? `
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:${colorOf(state.colorIdx).bg}"></div>Plus la barre est foncée, plus tu as d'heures libres ce jour-là</div>
      </div>
    ` : `
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#fff; border:1px solid var(--gold)"></div>Heure commune à tout le monde</div>
      </div>
    `}

    <div class="cal-wrap">
      <div class="cal-weekdays">${weekdaysHtml}</div>
      <div class="cal-grid">${gridHtml}</div>
    </div>

    <div style="text-align:center; padding-top:14px; font-size:12.5px; color:var(--ink-soft);">Touche un jour pour voir ou modifier les heures</div>

    ${state.view === 'mine' ? `
      <div class="bottom-actions">
        <button class="btn btn-ghost btn-small" id="btn-clear" style="flex:1">Effacer mes dispos</button>
      </div>
    ` : ''}

    ${state.sheetOpenFor ? buildSheetHtml(state.sheetOpenFor) : ''}
  `;

  document.body.style.overflow = state.sheetOpenFor ? 'hidden' : '';

  document.getElementById('btn-refresh').onclick = () => { refreshEverything(); showToast('Mis à jour.'); };
  document.getElementById('btn-leave').onclick = leaveRoom;
  document.getElementById('btn-today').onclick = () => { state.viewMonth = startOfMonth(new Date()); render(); };
  document.getElementById('btn-prev-month').onclick = () => { state.viewMonth = new Date(state.viewMonth.getFullYear(), state.viewMonth.getMonth()-1, 1); render(); };
  document.getElementById('btn-next-month').onclick = () => { state.viewMonth = new Date(state.viewMonth.getFullYear(), state.viewMonth.getMonth()+1, 1); render(); };
  document.querySelectorAll('.segmented button').forEach(b => { b.onclick = () => { state.view = b.dataset.v; render(); }; });
  const clearBtn = document.getElementById('btn-clear');
  if(clearBtn) clearBtn.onclick = clearMyAvail;

  document.querySelectorAll('.cal-cell').forEach(cell => {
    cell.onclick = () => openDaySheet(cell.dataset.date);
  });

  if(state.sheetOpenFor) attachSheetInteractions(state.sheetOpenFor);
}

/* ---------- DAY DETAIL SHEET (built as part of the main render) ---------- */
function buildHourRows(dateStr){
  if(state.view === 'mine'){
    return HOURS.map(h => {
      const slot = fmtSlot(dateStr, h);
      const on = state.myAvail.has(slot);
      return `<div class="hour-row">
        <div class="hour-time">${pad(h)}:00</div>
        <div class="hswitch ${on?'on':''}" data-hour="${h}"><div class="knob"></div></div>
      </div>`;
    }).join('');
  } else {
    return HOURS.map(h => {
      const slot = fmtSlot(dateStr, h);
      const here = state.members.filter(m => state.allAvail[m.name] && state.allAvail[m.name].has(slot));
      const full = state.members.length > 1 && here.length === state.members.length;
      const avatars = here.map(m => `<div class="member-dot" style="background:${colorOf(m.colorIdx).bg}" title="${escapeHtml(m.name)}">${m.name.charAt(0).toUpperCase()}</div>`).join('');
      return `<div class="hour-row ${full?'row-overlap':''}">
        <div class="hour-time">${pad(h)}:00</div>
        <div class="hour-avatars">${avatars || '<span style="font-size:12px; color:var(--ink-soft);">personne</span>'}</div>
      </div>`;
    }).join('');
  }
}

function buildSheetHtml(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const dateLabel = d.toLocaleDateString('fr-CA', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  return `
    <div class="overlay" id="day-overlay">
      <div class="sheet">
        <div class="sheet-header">
          <div>
            <h3>${dateLabel}</h3>
            <div class="sheet-sub">${state.view==='mine' ? 'Touche une heure pour indiquer si tu es libre' : 'Qui est libre, heure par heure'}</div>
          </div>
          <button class="sheet-close-x" id="sheet-close-x" aria-label="Fermer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        ${state.view==='mine' ? `
          <div class="sheet-quick">
            <button class="btn btn-ghost btn-small" id="btn-day-all" style="flex:1">Toute la journée libre</button>
            <button class="btn btn-ghost btn-small" id="btn-day-none" style="flex:1">Aucune dispo</button>
          </div>
        ` : ''}
        <div class="hour-list">${buildHourRows(dateStr)}</div>
        <button class="btn btn-ghost" style="width:100%; margin-top:16px;" id="sheet-close">Fermer</button>
      </div>
    </div>
  `;
}

function attachSheetInteractions(dateStr){
  const overlay = document.getElementById('day-overlay');
  if(!overlay) return;

  overlay.onclick = (e) => { if(e.target === overlay) closeSheet(); };
  const closeBtn = document.getElementById('sheet-close');
  const closeX = document.getElementById('sheet-close-x');
  if(closeBtn) closeBtn.onclick = closeSheet;
  if(closeX) closeX.onclick = closeSheet;

  const allBtn = document.getElementById('btn-day-all');
  const noneBtn = document.getElementById('btn-day-none');
  if(allBtn) allBtn.onclick = () => {
    HOURS.forEach(h => state.myAvail.add(fmtSlot(dateStr,h)));
    schedulePersist();
    render();
  };
  if(noneBtn) noneBtn.onclick = () => {
    HOURS.forEach(h => state.myAvail.delete(fmtSlot(dateStr,h)));
    schedulePersist();
    render();
  };

  if(state.view === 'mine'){
    document.querySelectorAll('.hswitch').forEach(sw => {
      sw.onclick = () => {
        const h = parseInt(sw.dataset.hour, 10);
        const slot = fmtSlot(dateStr, h);
        const turnOn = !state.myAvail.has(slot);
        if(turnOn) state.myAvail.add(slot); else state.myAvail.delete(slot);
        sw.classList.toggle('on', turnOn);
        schedulePersist();
      };
    });
  }
}

let persistTimer = null;
function schedulePersist(){
  if(persistTimer) clearTimeout(persistTimer);
  persistTimer = setTimeout(() => { persistMine(); }, 400);
}

function openDaySheet(dateStr){
  state.sheetOpenFor = dateStr;
  render();
}

function closeSheet(){
  state.sheetOpenFor = null;
  render();
}

function render(){
  if(state.screen === 'join') renderJoin();
  else renderPlanner();
}

render();
</script>
</body>
</html>
